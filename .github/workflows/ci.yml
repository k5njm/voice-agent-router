name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check custom_components/
      - name: Ruff format check
        run: ruff format --check custom_components/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pytest-asyncio pyyaml
      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bump patch version and tag
        run: |
          python3 - <<'EOF'
          import json, pathlib
          p = pathlib.Path("custom_components/voice_agent_router/manifest.json")
          m = json.loads(p.read_text())
          major, minor, patch = m["version"].split(".")
          m["version"] = f"{major}.{minor}.{int(patch) + 1}"
          p.write_text(json.dumps(m, indent=2) + "\n")
          print(m["version"])
          EOF
      - name: Commit and tag
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/voice_agent_router/manifest.json'))['version'])")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/voice_agent_router/manifest.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          if git ls-remote --tags origin "v$VERSION" | grep -q "v$VERSION"; then
            echo "Tag v$VERSION already exists — skipping."
            exit 0
          fi
          git tag "v$VERSION"
          git push origin main "v$VERSION"
